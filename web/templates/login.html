{% extends "base.html" %}
{% block title_suffix %} - Login{% endblock %}
{% block content %}
<div class="panel" style="max-width: 400px; margin: 40px auto;">
    <div class="panel-header">Enter the Realm</div>
    <div class="panel-body">
        <form method="POST">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" class="form-control"
                       required autofocus>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary btn-block">Enter</button>
        </form>
        <p class="mt-2 text-center text-dim">
            New adventurer? <a href="{{ url_for('register') }}">Create an account</a>
        </p>
    </div>
</div>
{% endblock %}
