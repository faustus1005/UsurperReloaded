{% extends "base.html" %}
{% block title_suffix %} - Register{% endblock %}
{% block content %}
<div class="panel" style="max-width: 400px; margin: 40px auto;">
    <div class="panel-header">Create Account</div>
    <div class="panel-body">
        <form method="POST">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" class="form-control"
                       required minlength="3" maxlength="30" autofocus>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" class="form-control"
                       required minlength="4">
            </div>
            <div class="form-group">
                <label for="confirm">Confirm Password</label>
                <input type="password" id="confirm" name="confirm" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary btn-block">Create Account</button>
        </form>
        <p class="mt-2 text-center text-dim">
            Already have an account? <a href="{{ url_for('login') }}">Log in</a>
        </p>
    </div>
</div>
{% endblock %}
