{% extends "base.html" %}
{% block title_suffix %} - Cave Result{% endblock %}
{% block content %}
<div class="panel">
    <div class="panel-header">Uman Cave Expedition</div>
    <div class="panel-body">
        <div class="combat-log">
            {% for entry in log %}
            <p{% if 'SUCCESS' in entry %} class="text-gold"{% elif 'FAILED' in entry or 'runs away' in entry %} class="text-red"{% elif 'strength bonus' in entry.lower() or 'Gained' in entry %} class="text-green"{% elif 'name your' in entry.lower() %} class="text-gold"{% endif %}>{{ entry }}</p>
            {% endfor %}
        </div>
    </div>
</div>

<div class="text-center mt-1">
    <a href="{{ url_for('uman_cave') }}" class="btn">Back to Cave</a>
    <a href="{{ url_for('main_menu') }}" class="btn">Back to Town</a>
</div>
{% endblock %}
